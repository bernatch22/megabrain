  <circle cx="671" cy="210" r="20" fill="url(#glow)" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.465;0.48;0.96;1" dur="11s" repeatCount="indefinite"/></circle>
  <circle cx="671" cy="210" r="4" fill="#3a3128"><animate attributeName="fill" values="#3a3128;#3a3128;#ffc98a;#ffa64d;#ffa64d;#3a3128" keyTimes="0;0.465;0.471;0.485;0.96;1" dur="11s" repeatCount="indefinite"/><animate attributeName="r" values="4;4;8;5.6;5.6;4" keyTimes="0;0.465;0.47;0.483;0.96;1" dur="11s" repeatCount="indefinite"/></circle>
  <text x="671" y="232" font-size="10.5" fill="#e9e4dc" text-anchor="middle" opacity="0" font-weight="600">agents.py<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.475;0.487;0.96;1" dur="11s" repeatCount="indefinite"/></text>

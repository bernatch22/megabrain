  <!-- status lines -->
  <text x="30" y="288" font-size="10" fill="#8a7f70" opacity="0">19 signal chunks (31 pruned) · 2 ms · no LLM<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.19;0.21;0.95;1" dur="16s" repeatCount="indefinite"/></text>
  <text x="30" y="310" font-size="10" fill="#ffb86b" opacity="0">rerank: one cheap LLM pass · ~1–2 s · fail-open<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.32;0.34;0.95;1" dur="16s" repeatCount="indefinite"/></text>
  <text x="30" y="338" font-size="11.5" font-weight="700" fill="#8ac89a" opacity="0">→ your agent reads signal, not a haystack<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.55;0.57;0.95;1" dur="16s" repeatCount="indefinite"/></text>
  <text x="30" y="364" font-size="8.5" fill="#8a7f70" opacity="0">the rerank can only drop, never invent — retrieval stays deterministic<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.60;0.62;0.95;1" dur="16s" repeatCount="indefinite"/></text>

  <!-- ═══════════════ RIGHT PANEL — ask + flow cache ═══════════════ -->
  <rect x="464" y="16" width="420" height="368" rx="10" fill="#12100c" stroke="#241d15"/>
  <text x="478" y="42" font-size="13" font-weight="700" fill="#ffa64d">megabrain_ask</text>
  <text x="870" y="42" text-anchor="end" font-size="9" fill="#8a7f70">narrate once · cache · repeats free</text>

  <text x="478" y="66" font-size="10.5" fill="#e9e4dc" opacity="0">$ megabrain ask . "how does the llm rerank work?"<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.05;0.08;0.95;1" dur="16s" repeatCount="indefinite"/></text>

  <!-- the narrated answer -->
  <rect x="476" y="74" width="392" height="98" rx="6" fill="#141210" stroke="#241d15" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.09;0.11;0.95;1" dur="16s" repeatCount="indefinite"/></rect>
  <text x="860" y="88" text-anchor="end" font-size="8" fill="#8ac89a" opacity="0">verbatim from disk · rerank.py L74<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.23;0.25;0.95;1" dur="16s" repeatCount="indefinite"/></text>
  <text x="486" y="92" font-size="9.5" fill="#c6bcae" opacity="0">The pruned list goes to a cheap model that returns<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.10;0.12;0.95;1" dur="16s" repeatCount="indefinite"/></text>
  <text x="486" y="106" font-size="9.5" fill="#c6bcae" opacity="0">only the chunk ids that answer the question:<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.13;0.15;0.95;1" dur="16s" repeatCount="indefinite"/></text>
  <rect x="484" y="114" width="376" height="50" rx="4" fill="#0f0d0a" stroke="#241d15" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.155;0.17;0.95;1" dur="16s" repeatCount="indefinite"/></rect>
  <text x="492" y="128" font-size="9" fill="#ffb86b" opacity="0">def llm_rerank(query, chunks, model=None):<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.16;0.18;0.95;1" dur="16s" repeatCount="indefinite"/></text>
  <text x="492" y="142" font-size="9" fill="#c6bcae" opacity="0">    keep = _model_pass(query, chunks)   # ids only<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.19;0.21;0.95;1" dur="16s" repeatCount="indefinite"/></text>
  <text x="492" y="156" font-size="9" fill="#c6bcae" opacity="0">    return keep or chunks               # fail-open<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.22;0.24;0.95;1" dur="16s" repeatCount="indefinite"/></text>
  <text x="478" y="188" font-size="10" fill="#8a7f70" opacity="0">27.8 s · one LLM call — cached ↓<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.27;0.29;0.95;1" dur="16s" repeatCount="indefinite"/></text>


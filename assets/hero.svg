<?xml version="1.0" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="megabrain graph path lighting up a knowledge graph, hop by hop, with no LLM">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0a08"/>
      <stop offset="1" stop-color="#12100b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffa64d" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#ffa64d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="898" height="358" rx="14" fill="url(#bg)" stroke="#2a2118" stroke-width="1.5"/>
  <line x1="336" y1="18" x2="336" y2="342" stroke="#241d15" stroke-width="1"/>
  <circle cx="28" cy="30" r="4.5" fill="#ff5f56"/>
  <circle cx="46" cy="30" r="4.5" fill="#ffbd2e"/>
  <circle cx="64" cy="30" r="4.5" fill="#27c93f"/>
  <text x="320" y="34" text-anchor="end" font-size="10" fill="#8a7f70">megabrain</text>

  <!-- typed command -->
  <text x="20" y="74" font-size="11" fill="#ffa64d" font-weight="600">$</text>
  <text x="33" y="74" font-size="11" fill="#e9e4dc" opacity="0">megabrain graph<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.04;0.08;0.96;1" dur="11s" repeatCount="indefinite"/></text>
  <text x="128" y="74" font-size="11" fill="#c6bcae" opacity="0">--path scoring narrator<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.10;0.16;0.96;1" dur="11s" repeatCount="indefinite"/></text>
  <rect y="65" width="7" height="12" fill="#ffa64d" x="270" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.9;0.15;0.9;0.15;0.9;0" keyTimes="0;0.18;0.26;0.34;0.42;0.96;1" dur="11s" repeatCount="indefinite"/>
  </rect>

  <!-- warning + the answer, printed line by line -->
  <text x="20" y="106" font-size="10.5" fill="#d68a5a" opacity="0" style="white-space:pre">scoring.py and narrator.py never call each other —<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.30;0.32;0.96;1" dur="11s" repeatCount="indefinite"/></text>
  <text x="20" y="122" font-size="10.5" fill="#d68a5a" opacity="0" style="white-space:pre">shown in call-flow order (the calls run this way)<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.315;0.335;0.96;1" dur="11s" repeatCount="indefinite"/></text>

  <text x="20" y="152" font-size="11" fill="#ffa64d" opacity="0" style="white-space:pre">narrator.py<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.345;0.365;0.96;1" dur="11s" repeatCount="indefinite"/></text>
  <text x="20" y="174" font-size="11" fill="#c6bcae" opacity="0" style="white-space:pre">  └─ call → agents.py    · via stream_events<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.42;0.44;0.96;1" dur="11s" repeatCount="indefinite"/></text>
  <text x="20" y="196" font-size="11" fill="#c6bcae" opacity="0" style="white-space:pre">  └─ call → scoring.py   · via ident_tokens<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.49;0.51;0.96;1" dur="11s" repeatCount="indefinite"/></text>

  <text x="20" y="236" font-size="11.5" fill="#8ac89a" font-weight="600" opacity="0" style="white-space:pre">2 hops · real call sites · 0 files opened<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.56;0.58;0.96;1" dur="11s" repeatCount="indefinite"/></text>
  <text x="20" y="330" font-size="10" fill="#8a7f70" opacity="0" style="white-space:pre">no LLM in the retrieval path · ~200ms<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.60;0.62;0.96;1" dur="11s" repeatCount="indefinite"/></text>

  <!-- background graph (faint) -->

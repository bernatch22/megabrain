    <line x1="579.5" y1="39.1" x2="531.0" y2="118.0"/><line x1="452.6" y1="251.7" x2="406.0" y2="205.0"/>
    <line x1="689.5" y1="37.6" x2="650.1" y2="109.9"/><line x1="637.3" y1="325.8" x2="671.0" y2="210.0"/>
    <line x1="501.1" y1="314.7" x2="557.5" y2="197.8"/><line x1="398.1" y1="146.0" x2="448.7" y2="145.4"/>

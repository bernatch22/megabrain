    <line x1="738.7" y1="235.7" x2="794.8" y2="213.5"/>
    <circle cx="689.5" cy="37.6" r="3.4" fill="#3a3128"/><circle cx="738.7" cy="235.7" r="3.4" fill="#3a3128"/>
    <circle cx="817.4" cy="56.4" r="3.4" fill="#3a3128"/><circle cx="579.5" cy="39.1" r="3.4" fill="#3a3128"/>
    <circle cx="476.6" cy="183.6" r="3.4" fill="#3a3128"/><circle cx="379.4" cy="90.4" r="3.4" fill="#3a3128"/>
    <circle cx="775.6" cy="32.0" r="3.4" fill="#3a3128"/><circle cx="773.7" cy="242.2" r="3.4" fill="#3a3128"/>
    <circle cx="850.3" cy="132.3" r="3.4" fill="#3a3128"/><circle cx="412.9" cy="59.4" r="3.4" fill="#3a3128"/>
    <circle cx="794.8" cy="213.5" r="3.4" fill="#3a3128"/><circle cx="637.3" cy="325.8" r="3.4" fill="#3a3128"/>
    <circle cx="557.5" cy="197.8" r="3.4" fill="#3a3128"/><circle cx="481.3" cy="118.0" r="3.4" fill="#3a3128"/>
    <circle cx="417.1" cy="114.5" r="3.4" fill="#3a3128"/><circle cx="687.7" cy="140.9" r="3.4" fill="#3a3128"/>
    <circle cx="501.1" cy="314.7" r="3.4" fill="#3a3128"/><circle cx="452.6" cy="251.7" r="3.4" fill="#3a3128"/>
    <circle cx="481.9" cy="39.8" r="3.4" fill="#3a3128"/><circle cx="828.8" cy="169.5" r="3.4" fill="#3a3128"/>
    <circle cx="870.8" cy="184.9" r="3.4" fill="#3a3128"/><circle cx="766.8" cy="158.3" r="3.4" fill="#3a3128"/>
    <circle cx="398.1" cy="146.0" r="3.4" fill="#3a3128"/><circle cx="866.7" cy="224.6" r="3.4" fill="#3a3128"/>
    <circle cx="850.3" cy="132.3" r="3.4" fill="#3a3128"/>
  </g>

  <!-- the path: narrator (806,120) → agents (671,210) → scoring (531,118), lit hop by hop -->
  <line x1="806" y1="120" x2="671" y2="210" stroke="#2a2118" stroke-width="1.2"/>
  <line x1="671" y1="210" x2="531" y2="118" stroke="#2a2118" stroke-width="1.2"/>
  <line x1="806" y1="120" x2="671" y2="210" stroke="#ffa64d" stroke-width="2" stroke-linecap="round" stroke-dasharray="162.2" stroke-dashoffset="162.2">
    <animate attributeName="stroke-dashoffset" values="162.2;162.2;0;0;162.2" keyTimes="0;0.42;0.47;0.96;1" dur="11s" repeatCount="indefinite"/>
  </line>
  <text x="738.5" y="159" font-size="9" fill="#ffb86b" text-anchor="middle" opacity="0" font-style="italic">stream_events<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.445;0.46;0.96;1" dur="11s" repeatCount="indefinite"/></text>
  <line x1="671" y1="210" x2="531" y2="118" stroke="#ffa64d" stroke-width="2" stroke-linecap="round" stroke-dasharray="167.5" stroke-dashoffset="167.5">

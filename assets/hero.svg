  <circle cx="531" cy="118" r="4" fill="#3a3128"><animate attributeName="fill" values="#3a3128;#3a3128;#ffc98a;#ffa64d;#ffa64d;#3a3128" keyTimes="0;0.535;0.541;0.555;0.96;1" dur="11s" repeatCount="indefinite"/><animate attributeName="r" values="4;4;8;5.6;5.6;4" keyTimes="0;0.535;0.54;0.553;0.96;1" dur="11s" repeatCount="indefinite"/></circle>

  <circle cx="806" cy="120" r="20" fill="url(#glow)" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.345;0.36;0.96;1" dur="11s" repeatCount="indefinite"/></circle>
  <circle cx="806" cy="120" r="4" fill="#3a3128"><animate attributeName="fill" values="#3a3128;#3a3128;#ffc98a;#ffa64d;#ffa64d;#3a3128" keyTimes="0;0.345;0.351;0.365;0.96;1" dur="11s" repeatCount="indefinite"/><animate attributeName="r" values="4;4;8;5.6;5.6;4" keyTimes="0;0.345;0.35;0.363;0.96;1" dur="11s" repeatCount="indefinite"/></circle>
  <text x="806" y="106" font-size="10.5" fill="#e9e4dc" text-anchor="middle" opacity="0" font-weight="600">narrator.py<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.355;0.367;0.96;1" dur="11s" repeatCount="indefinite"/></text>

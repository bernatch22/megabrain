    <line x1="448.7" y1="145.4" x2="481.3" y2="118.0"/><line x1="766.8" y1="158.3" x2="806.0" y2="120.0"/>
    <line x1="870.8" y1="184.9" x2="828.8" y2="169.5"/><line x1="379.4" y1="90.4" x2="412.9" y2="59.4"/>

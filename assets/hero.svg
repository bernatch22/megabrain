  <text x="478" y="378" font-size="8.5" fill="#8a7f70" opacity="0">a cited file changed? sha mismatch → narrates fresh &amp; re-caches — never stale<animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.72;0.74;0.95;1" dur="16s" repeatCount="indefinite"/></text>

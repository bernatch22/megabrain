name: Release

# DISABLED as an automatic tag trigger — releases are published manually with
# `python -m build && twine upload dist/*` for now, because PyPI Trusted
# Publishing isn't configured for this repo yet (the OIDC exchange fails).
# Pushing a version tag no longer runs this workflow, so no failing run / email.
# To re-enable: set up the trusted publisher on pypi.org, then restore
#   on:\n    push:\n      tags: ["v*"]
# Until then this only runs on manual dispatch.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build && python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true   # idempotent: a version already on PyPI is a no-op, not a failure

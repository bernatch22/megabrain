name: CI

on:
  push:
    branches: [master]
  pull_request:
  # Callable so `release.yml` runs these EXACT gates against the tagged commit
  # before publishing — one definition, two entry points. A tag push does not
  # trigger the `push: branches` above (a tag is not a branch), so without this
  # the release path had no lint/test gate at all: 0.13.0, 0.13.1 and 0.14.0
  # all shipped with ruff failing on master.
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[languages]" pytest
      # the suite is fully offline — no API key, no network, no private corpus
      - run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build && python -m build
      - run: pip install dist/*.whl && megabrain --help
